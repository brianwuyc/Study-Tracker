<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root{
  --bg:#0F2942;
  --grid:rgba(142,202,230,0.09);
  --panel:#153453;
  --panel2:#1B3E60;
  --line:#8ECAE6;
  --text:#EAF3FA;
  --text-dim:#89ADC7;
  --accent:#F4A259;
  --stamp:#D9542B;
  --done:#6FCF97;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Space Grotesk',system-ui,sans-serif; min-height:100vh;}
body{
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 24px 24px;
  padding-bottom: 40px;
}
.wrap{max-width:480px; margin:0 auto; padding:18px 16px 8px;}

/* Title block, drafting style */
.titleblock{
  border:1.5px solid var(--line);
  border-radius:4px;
  padding:0;
  margin-bottom:16px;
  overflow:hidden;
  background:var(--panel);
}
.titleblock .row{display:flex; border-bottom:1px solid rgba(142,202,230,0.3);}
.titleblock .row:last-child{border-bottom:none;}
.titleblock .cell{flex:1; padding:8px 12px; border-right:1px solid rgba(142,202,230,0.3);}
.titleblock .cell:last-child{border-right:none;}
.tb-label{font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; margin-bottom:2px;}
.tb-value{font-size:15px; font-weight:700;}
.tb-main{padding:12px 14px; text-align:center; background:var(--panel2);}
.tb-main .tb-title{font-size:11px; letter-spacing:3px; color:var(--accent); font-family:'JetBrains Mono',monospace;}
.tb-main .tb-phase{font-size:17px; font-weight:700; margin-top:4px;}

/* Day nav */
.daynav{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
.daynav button{
  background:var(--panel); border:1px solid var(--line); color:var(--line);
  width:40px; height:40px; border-radius:6px; font-size:18px; cursor:pointer;
}
.daynav .datebox{text-align:center;}
.daynav .datebox .big{font-size:20px; font-weight:700;}
.daynav .datebox .small{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);}
.today-btn{
  display:block; margin:0 auto 16px; background:none; border:1px solid var(--accent);
  color:var(--accent); font-family:'JetBrains Mono',monospace; font-size:11px;
  padding:5px 14px; border-radius:20px; cursor:pointer;
}

/* Checklist */
.section-label{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin:18px 0 8px 2px;}
.checklist{display:flex; flex-direction:column; gap:8px;}
.task{
  display:flex; align-items:flex-start; gap:10px;
  background:var(--panel); border:1px solid rgba(142,202,230,0.25);
  border-radius:6px; padding:12px 12px; cursor:pointer; transition:all .15s ease;
}
.task.done{border-color:var(--done); background:rgba(111,207,151,0.08);}
.task .box{
  flex-shrink:0; width:22px; height:22px; border:2px solid var(--line); border-radius:4px;
  margin-top:1px; display:flex; align-items:center; justify-content:center; font-size:14px; color:transparent;
}
.task.done .box{background:var(--done); border-color:var(--done); color:#0F2942; font-weight:700;}
.task .txt{font-size:14.5px; line-height:1.4;}
.task.done .txt{color:var(--text-dim); text-decoration:line-through;}
.task.recurring .txt::before{content:"↻ "; color:var(--accent);}
.task-body{flex:1; min-width:0;}
.note-input{
  margin-top:6px; width:100%; background:rgba(0,0,0,0.2); border:1px solid rgba(142,202,230,0.25);
  border-radius:5px; padding:6px 8px; font-size:12.5px; color:var(--text);
  font-family:'Space Grotesk',system-ui,sans-serif; resize:none;
}
.note-input::placeholder{color:var(--text-dim); opacity:0.7;}
.note-input:focus{outline:none; border-color:var(--accent);}

/* 筆記總覽 */
.notes-toggle{
  display:block; width:100%; margin-top:10px; background:var(--panel); border:1px solid var(--line);
  color:var(--line); border-radius:6px; padding:10px; font-size:13px; font-family:'JetBrains Mono',monospace;
  cursor:pointer; text-align:center;
}
.notes-panel{display:none; margin-top:10px;}
.notes-panel.open{display:block;}
.note-card{
  background:var(--panel); border:1px solid rgba(142,202,230,0.25); border-left:3px solid var(--accent);
  border-radius:6px; padding:10px 12px; margin-bottom:8px;
}
.note-card .ndate{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--accent); margin-bottom:3px;}
.note-card .ntask{font-size:12px; color:var(--text-dim); margin-bottom:4px;}
.note-card .ntext{font-size:14px; line-height:1.4;}
.notes-empty{text-align:center; color:var(--text-dim); font-size:13px; padding:16px;}

/* Rest toggle */
.restbar{margin-top:14px; display:flex; align-items:center; justify-content:space-between; background:var(--panel); border:1px dashed rgba(142,202,230,0.4); border-radius:6px; padding:10px 12px;}
.restbar span{font-size:13px; color:var(--text-dim);}
.restbtn{background:none; border:1px solid var(--accent); color:var(--accent); border-radius:20px; padding:5px 14px; font-size:12px; font-family:'JetBrains Mono',monospace; cursor:pointer;}
.restbtn.active{background:var(--accent); color:var(--bg); font-weight:700;}

/* Stamp */
.stamp-wrap{display:flex; justify-content:center; margin:18px 0 6px; min-height:70px; align-items:center;}
.stamp{
  border:3px solid var(--stamp); color:var(--stamp); border-radius:8px;
  padding:8px 18px; font-family:'JetBrains Mono',monospace; font-weight:700;
  font-size:15px; letter-spacing:2px; transform:rotate(-6deg); opacity:0;
  animation:stampIn .35s ease forwards;
}
@keyframes stampIn{ from{opacity:0; transform:rotate(-6deg) scale(1.6);} to{opacity:1; transform:rotate(-6deg) scale(1);} }

/* Week progress */
.weekcard{background:var(--panel); border:1px solid rgba(142,202,230,0.25); border-radius:6px; padding:14px; margin-top:10px;}
.weekcard .whead{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
.weekcard .whead .wtitle{font-size:13px; color:var(--text-dim);}
.weekcard .whead .wpct{font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--accent);}
.bar{height:10px; background:rgba(142,202,230,0.15); border-radius:5px; overflow:hidden;}
.bar-fill{height:100%; background:linear-gradient(90deg, var(--accent), var(--done)); border-radius:5px; transition:width .3s ease;}

/* Countdown */
.countdown{
  text-align:center; margin-top:18px; padding:14px; border-radius:6px;
  background:linear-gradient(135deg, var(--panel2), var(--panel));
  border:1px solid var(--line);
}
.countdown .num{font-size:32px; font-weight:700; color:var(--accent); font-family:'JetBrains Mono',monospace;}
.countdown .lbl{font-size:11px; color:var(--text-dim); letter-spacing:2px; margin-top:2px;}

.footer-note{text-align:center; font-size:11px; color:var(--text-dim); margin-top:22px; line-height:1.6;}
</style>
</head>

function extractLabel(taskText){
  // 取任務文字「—」前面的章節標籤部分，例如「土力 Ch5 滲透性 — 讀完（高分章節）」→「土力 Ch5 滲透性」
  const idx = taskText.indexOf('—');
  let label = idx > -1 ? taskText.slice(0, idx).trim() : taskText.trim();
  // 去掉「挑X題獨立驗證」「隨機抽」這類本身沒有新章節資訊的敘述，保留章節代號
  return label;
}

function buildBlindWriteTask(dayTasks){
  const labels = [];
  dayTasks.forEach(t => {
    const l = extractLabel(t);
    if(l && !labels.includes(l)) labels.push(l);
  });
  if(labels.length === 0){
    return "公式盲寫 15–20 分鐘：複習最近讀過章節的公式（闔書默寫，不看小抄）";

];

function subjectPhase(subject){
  if(['PC','RC/PC','土力','基工','土力/基工','結構'].includes(subject)) return '第一階段：打底';
  return '第二階段：補完全科';
}

const DAILY = {};
(function buildDailyAssignments(){
  let ptr = 0;
  let d = PHASE12_START;
  while(d <= PHASE12_END){
    const items = [];
    if(ptr < QUEUE.length){
      const first = QUEUE[ptr];
      items.push(first);
      ptr++;
      // 只有「輕量任務」在假日才能跟下一個輕量任務合併成同一天，
      // 計算密集的任務(未標記l:true)不管平日假日都只排一個，避免塞不下
      if(isWeekendDate(d) && first.l && QUEUE[ptr] && QUEUE[ptr].l){
        items.push(QUEUE[ptr]);
        ptr++;
      }
    }
    if(items.length === 0){
      DAILY[d] = { subject:'彈性日', tasks:['彈性複習日：補進度、複習卡住的公式與錯題本，或提前預習下一科'] };
    } else {
      DAILY[d] = { subject: items[0].s, tasks: items.map(it => it.t) };
    }
    d = addDays(d, 1);
  }
})();

const SUBJECT_BLOCKS = [];
(function buildSubjectBlocks(){
  let d = PHASE12_START;
  let cur = null;
  while(d <= PHASE12_END){
    const subj = DAILY[d].subject;
    if(cur && cur.subject === subj){
      cur.end = d;
    } else {
      cur = { subject: subj, start: d, end: d };
      SUBJECT_BLOCKS.push(cur);
    }
    d = addDays(d, 1);
  }
})();

const WEEKS = [

function findWeek(dateStr){
  return WEEKS.find(w => dateStr >= w.start && dateStr <= w.end);
}
function isWeekendDate(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  return day === 0 || day === 6;
}
function todayStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function addDays(dateStr, delta){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + delta);
  const ny = dt.getFullYear();
  const nm = String(dt.getMonth()+1).padStart(2,'0');
  const nd = String(dt.getDate()).padStart(2,'0');
  return `${ny}-${nm}-${nd}`;
}
function fmtDisplay(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const weekdays = ['週日','週一','週二','週三','週四','週五','週六'];
  return { big: `${m}/${d}`, small: weekdays[dt.getDay()] };
}
function getTasksForDate(dateStr){
  if(dateStr >= EXAM_START && dateStr <= EXAM_END){
    return { isExam:true, tasks:["檢查應考用品：准考證、計算機、文具、手錶","保持平常心，相信這幾個月的準備"] };
  }
  if(dateStr >= PHASE12_START && dateStr <= PHASE12_END){
    const day = DAILY[dateStr];
    if(!day) return { isExam:false, tasks:[] };
    let tasks = [buildBlindWriteTask(day.tasks), ...day.tasks];
    return { isExam:false, tasks, week:{ phase: subjectPhase(day.subject), label: day.subject } };
  }
  const week = findWeek(dateStr);
  if(!week) return { isExam:false, tasks:[] };
  const weekTasks = isWeekendDate(dateStr) ? week.weekend : week.weekday;
  let tasks = [buildBlindWriteTask(weekTasks)];
  if(week.examDrill) tasks = [...tasks, ...RECURRING_DRILL];
  tasks = [...tasks, ...weekTasks];
  return { isExam:false, tasks, week };
}

let currentDate = clampToRange(todayStr());
function clampToRange(dateStr){
  if(dateStr < PLAN_START) return PLAN_START;
  if(dateStr > EXAM_END) return EXAM_END;
  return dateStr;
}

// 改用瀏覽器本機儲存(localStorage)，因為這個檔案是直接在Safari開啟的本機檔案，
// 不透過 Claude 平台，所以不會有呼叫次數限制，資料存在這支手機的 Safari 裡
const weekCache = {};

function weekKeyOf(dateStr){
  if(dateStr >= EXAM_START && dateStr <= EXAM_END) return 'EXAM';
  if(dateStr >= PHASE12_START && dateStr <= PHASE12_END) return dateStr;
  const week = findWeek(dateStr);
  return week ? week.start : null;
}

function loadWeekData(weekKey){
  if(weekCache[weekKey]) return weekCache[weekKey];
  let data;
  try{
    const raw = localStorage.getItem(`week:${weekKey}`);
    data = raw ? JSON.parse(raw) : { dates: {} };
  }catch(e){
    data = { dates: {} };
  }
  weekCache[weekKey] = data;
  return data;
}

function saveWeekData(weekKey, data){
  weekCache[weekKey] = data;
  try{
    localStorage.setItem(`week:${weekKey}`, JSON.stringify(data));
  }catch(e){
    console.error('storage save failed', e);
  }
}

async function loadDay(dateStr){
  const wk = weekKeyOf(dateStr);
  if(!wk) return { checks: [], rest: false, notes: [] };
  const weekData = loadWeekData(wk);
  const d = weekData.dates[dateStr] || { checks: [], rest: false, notes: [] };
  if(!d.notes) d.notes = [];
  return d;
}

async function saveDay(dateStr, dayData){
  const wk = weekKeyOf(dateStr);
  if(!wk) return;
  const weekData = loadWeekData(wk);
  weekData.dates[dateStr] = dayData;
  saveWeekData(wk, weekData);
}

async function render(){
  const dateStr = currentDate;
  const { isExam, tasks, week } = getTasksForDate(dateStr);
  const disp = fmtDisplay(dateStr);
  document.getElementById('dateBig').textContent = disp.big;
  document.getElementById('dateSmall').textContent = disp.small + (dateStr === todayStr() ? '（今天）' : '');

  if(isExam){
    document.getElementById('phaseTitle').textContent = '考試日';
    document.getElementById('weekLabel').textContent = '祝考試順利';
  } else if(week){
    document.getElementById('phaseTitle').textContent = week.phase;
    document.getElementById('weekLabel').textContent = week.label;
  }

  const dayData = await loadDay(dateStr);
  const checklistEl = document.getElementById('checklist');
  checklistEl.innerHTML = '';
  tasks.forEach((t, i) => {
    const isDone = !!dayData.checks[i];
    const isRecurring = t.startsWith('公式盲寫') || RECURRING_DRILL.includes(t);
    const div = document.createElement('div');
    div.className = 'task' + (isDone ? ' done' : '') + (isRecurring ? ' recurring' : '');
    const box = document.createElement('div');
    box.className = 'box';
    box.textContent = isDone ? '✓' : '';
    const body = document.createElement('div');
    body.className = 'task-body';
    const txt = document.createElement('div');
    txt.className = 'txt';
    txt.textContent = t;
    const noteInput = document.createElement('input');
    noteInput.className = 'note-input';
    noteInput.type = 'text';
    noteInput.placeholder = '備註（例如：多寫了幾題／這裡還不熟）';
    noteInput.value = dayData.notes[i] || '';
    noteInput.onclick = (e) => e.stopPropagation();
    noteInput.oninput = async () => {
      dayData.notes[i] = noteInput.value;
      await saveDay(dateStr, dayData);
    };
    body.appendChild(txt);
    body.appendChild(noteInput);
    div.appendChild(box);
    div.appendChild(body);
    div.onclick = async () => {
      dayData.checks[i] = !dayData.checks[i];
      await saveDay(dateStr, dayData);
      render();
    };
    checklistEl.appendChild(div);
  });

  // rest state
  const restBtn = document.getElementById('restBtn');
  const restLabel = document.getElementById('restLabel');
  restBtn.classList.toggle('active', !!dayData.rest);
  restLabel.textContent = dayData.rest ? '今天標記為休息日' : '今天狀態正常';
  restBtn.onclick = async () => {
    dayData.rest = !dayData.rest;
    await saveDay(dateStr, dayData);
    render();
  };

  // stamp if all done
  const stampWrap = document.getElementById('stampWrap');
  stampWrap.innerHTML = '';
  if(tasks.length > 0 && tasks.every((t,i) => dayData.checks[i])){
    const s = document.createElement('div');
    s.className = 'stamp';
    s.textContent = 'PASSED ✓ 今日完成';
    stampWrap.appendChild(s);
  }

  // countdown
  const diff = Math.round((new Date(EXAM_START) - new Date(todayStr())) / 86400000);
  document.getElementById('countdownNum').textContent = diff >= 0 ? diff : '考試期間';

  // 進度條：Phase1/2 用「科目區塊」進度，Phase3/4 用「週」進度
  if(dateStr >= PHASE12_START && dateStr <= PHASE12_END){
    renderSubjectProgress(dateStr);
  } else if(week){
    renderWeekProgress(week);
  } else {
    document.getElementById('weekProgressLabel').textContent = '—';
    document.getElementById('weekProgressPct').textContent = '';
    document.getElementById('weekBar').style.width = '0%';
  }

  document.getElementById('prevBtn').disabled = dateStr <= PLAN_START;
  document.getElementById('nextBtn').disabled = dateStr >= EXAM_END;
}

async function renderSubjectProgress(dateStr){
  const block = SUBJECT_BLOCKS.find(b => dateStr >= b.start && dateStr <= b.end);
  if(!block){
    document.getElementById('weekProgressLabel').textContent = '—';
    document.getElementById('weekProgressPct').textContent = '';
    document.getElementById('weekBar').style.width = '0%';
    return;
  }
  const dates = [];
  let d = block.start;
  while(d <= block.end){ dates.push(d); d = addDays(d, 1); }
  let total = 0, done = 0;
  for(const ds of dates){
    const { tasks } = getTasksForDate(ds);
    const dayData = await loadDay(ds);
    total += tasks.length;
    done += tasks.filter((t,i) => dayData.checks[i]).length;
  }
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('weekProgressLabel').textContent = `${block.subject} 進度`;
  document.getElementById('weekProgressPct').textContent = `${done}/${total} 項`;
  document.getElementById('weekBar').style.width = pct + '%';
}

async function renderWeekProgress(week){
  const dates = [];
  let d = week.start;
  while(d <= week.end){ dates.push(d); d = addDays(d, 1); }
  let total = 0, done = 0;
  for(const ds of dates){
    const { tasks } = getTasksForDate(ds);
    const dayData = await loadDay(ds);
    total += tasks.length;
    done += tasks.filter((t,i) => dayData.checks[i]).length;
  }
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('weekProgressLabel').textContent = `${week.label}`;
  document.getElementById('weekProgressPct').textContent = `${done}/${total} 項`;
  document.getElementById('weekBar').style.width = pct + '%';
}

function getAllDates(){
  const dates = [];
  let d = PHASE12_START;
  while(d <= PHASE12_END){ dates.push(d); d = addDays(d, 1); }
  WEEKS.forEach(w => {
    let dd = w.start;
    while(dd <= w.end){ dates.push(dd); dd = addDays(dd, 1); }
  });
  let ed = EXAM_START;
  while(ed <= EXAM_END){ dates.push(ed); ed = addDays(ed, 1); }
  return dates;
}

async function collectAllNotes(filterFn){
  const dates = getAllDates();
  const results = [];
  for(const ds of dates){
    const { tasks } = getTasksForDate(ds);
    const dayData = await loadDay(ds);
    (dayData.notes || []).forEach((note, i) => {
      if(note && note.trim()){
        const task = tasks[i] || '';
        if(!filterFn || filterFn(task)){
          results.push({ date: ds, task, note: note.trim() });
        }
      }
    });
  }
  results.sort((a,b) => a.date.localeCompare(b.date));
  return results;
}

function renderNoteCards(notes, emptyMsg){
  if(notes.length === 0) return `<div class="notes-empty">${emptyMsg}</div>`;
  return notes.map(n => {
    const disp = fmtDisplay(n.date);
    return `<div class="note-card">
      <div class="ndate">${disp.big} ${disp.small}</div>
      <div class="ntask">${n.task}</div>
      <div class="ntext">${n.note}</div>
    </div>`;
  }).join('');
}

async function renderNotesPanel(){
  const panel = document.getElementById('notesPanel');
  const notes = await collectAllNotes(t => !t.startsWith('公式盲寫'));
  panel.innerHTML = renderNoteCards(notes, '還沒有任何備註，寫完題目覺得不熟的地方，可以在任務下方輸入框記錄下來');
}

async function renderFormulaPanel(){
  const panel = document.getElementById('formulaPanel');
  const notes = await collectAllNotes(t => t.startsWith('公式盲寫'));
  panel.innerHTML = renderNoteCards(notes, '還沒有公式盲寫的備註，盲寫完寫不出來的公式，可以在「公式盲寫」任務下方記錄章節+公式名稱');
}

document.getElementById('formulaToggle').onclick = async () => {
  const panel = document.getElementById('formulaPanel');
  const isOpen = panel.classList.contains('open');
  if(isOpen){
    panel.classList.remove('open');
  } else {
    panel.classList.add('open');
    panel.innerHTML = '<div class="notes-empty">載入中…</div>';
    await renderFormulaPanel();
  }
};

document.getElementById('notesToggle').onclick = async () => {
  const panel = document.getElementById('notesPanel');
  const isOpen = panel.classList.contains('open');
  if(isOpen){
    panel.classList.remove('open');
  } else {
    panel.classList.add('open');
    panel.innerHTML = '<div class="notes-empty">載入中…</div>';
    await renderNotesPanel();
  }
};

document.getElementById('prevBtn').onclick = () => { currentDate = clampToRange(addDays(currentDate, -1)); render(); };
document.getElementById('nextBtn').onclick = () => { currentDate = clampToRange(addDays(currentDate, 1)); render(); };
document.getElementById('todayBtn').onclick = () => { currentDate = clampToRange(todayStr()); render(); };

render();
